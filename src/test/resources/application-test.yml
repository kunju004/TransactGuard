spring:
  datasource:
    url: jdbc:h2:mem:transactguard_test;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: false
    open-in-view: false

  sql:
    init:
      mode: never

  kafka:
    bootstrap-servers: localhost:9092

app:
  messaging:
    kafka:
      enabled: false
